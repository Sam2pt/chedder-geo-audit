<!-- This file is used by Netlify to detect forms at build time.
     Only the PDF download form is active. -->
<!DOCTYPE html>
<html>
<head><title>Netlify Form Detection</title></head>
<body>
  <form name="pdf-download" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="company" />
    <input type="text" name="website" />
    <input type="text" name="score" />
    <input type="text" name="bot-field" />
  </form>
</body>
</html>
