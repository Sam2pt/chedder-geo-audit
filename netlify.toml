[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# The rendered HTML is tied to specific JS/CSS chunk hashes. Netlify's
# Durable cache honors stale-while-revalidate semantics even when the
# browser header says must-revalidate, which means a stale HTML can be
# served to the browser pointing at chunks that no longer exist — the
# browser then hits ChunkLoadError and the page fails to render.
#
# Fix:
#  - Cache-Control tells the BROWSER the HTML is always revalidated
#    (max-age=0, must-revalidate).
#  - Netlify-CDN-Cache-Control tells Netlify's EDGE not to store it at
#    all (no-store). Every request hits origin so the chunk references
#    are always in sync with the deployed build.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

# Hashed static assets are immutable (content-hashed) so they can be
# cached aggressively at both the browser and the CDN.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"
